# yaml-language-server: $schema=https://raw.githubusercontent.com/ShadowBlip/InputPlumber/refs/heads/main/rootfs/usr/share/inputplumber/schema/composite_device_v1.json
# Schema version number
version: 1

# The type of configuration schema
kind: CompositeDevice

# Name of the composite device mapping
name: MSI Claw

# Only allow a single source device per composite device of this type.
single_source: false

# Only use this profile if *any* of the given matches match. If this list is
# empty, then the source devices will *always* be checked.
# /sys/class/dmi/id/product_name
matches:
  - dmi_data:
      product_name: "Claw A1M"
      sys_vendor: "Micro-Star International Co., Ltd."

# One or more source devices to combine into a single virtual device. The events
# from these devices will be watched and translated according to the key map.
source_devices:
  # Extra Buttons
  - group: keyboard
    evdev:
      name: AT Translated Set 2 keyboard
      phys_path: isa0060/serio0/input0

  # Gamepad
  - group: gamepad
    evdev:
      vendor_id: "0db0"
      product_id: "1901"
      phys_path: "usb-0000:00:14.0-9/input0"

  # Xinput remapping gamepad
  # input2 exposes both a keyboard and a mouse event node, allow both to match
  - group: gamepad
    unique: false
    evdev:
      vendor_id: "0db0"
      product_id: "1901"
      phys_path: "usb-0000:00:14.0-9/input2"

  - group: gamepad
    passthrough: true
    hidraw:
      vendor_id: 0x0db0
      product_id: 0x1901
      interface_num: 2

  # Interface 01 for M1/M2 button configuration (hid-msi-claw driver)
  - group: gamepad
    hidraw:
      vendor_id: 0x0db0
      product_id: 0x1901
      interface_num: 1

  # IMU
  # NOTE: gyro_3d max sample_rate is 100 Hz (HID Sensor Hub hardware limit).
  # Setting it below 100 causes the hub to stall on rapid raw reads.
  # Do NOT set a custom sample_rate for gyro_3d on this device.
  - group: imu
    iio:
      name: accel_3d
  - group: imu
    iio:
      name: gyro_3d

  # Touchscreen
  #- group: touchscreen
  #  udev:
  #    properties:
  #      - name: ID_INPUT_TOUCHSCREEN
  #        value: "1"
  #    sys_name: "event*"
  #    subsystem: input

# Optional configuration for the composite device
options:
  # If true, InputPlumber will automatically try to manage the input device. If
  # this is false, InputPlumber will not try to manage the device unless an
  # external service enables management of the device. Defaults to 'false'
  auto_manage: true

# The target input device(s) to emulate by default
target_devices:
  - xbox-elite
  - mouse
  - keyboard
  #- touchscreen

# The ID of a device event mapping in the 'event_maps' folder
capability_map_id: claw1
